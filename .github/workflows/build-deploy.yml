name: build-and-deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      caddy_hostname:
        description: "Private hostname to expose via /opt/caddy/Caddyfile"
        required: false
        default: "codex.shauryaa.dev"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/0oastro/codex-openai-proxy
  DEPLOY_DIR: /opt/codex-openai-proxy

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.image_ref.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: image_ref
        name: Set image ref output
        run: echo "image_ref=${IMAGE_NAME}:sha-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

  deploy-trixie:
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      TRIXIE_SSH_HOST: ${{ secrets.TRIXIE_SSH_HOST }}
      TRIXIE_SSH_USER: ${{ secrets.TRIXIE_SSH_USER }}
      TRIXIE_SSH_PORT: ${{ secrets.TRIXIE_SSH_PORT }}
      IMAGE_REF: ${{ needs.build.outputs.image_ref }}
      CADDY_HOSTNAME: ${{ github.event.inputs.caddy_hostname || 'codex.shauryaa.dev' }}
      PROXY_API_KEY: ${{ secrets.CODEX_OPENAI_PROXY_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required SSH secrets
        run: |
          set -euo pipefail
          test -n "${TRIXIE_SSH_HOST}" || (echo "Missing secret: TRIXIE_SSH_HOST" && exit 1)
          test -n "${TRIXIE_SSH_USER}" || (echo "Missing secret: TRIXIE_SSH_USER" && exit 1)
          test -n "${{ secrets.TRIXIE_SSH_PRIVATE_KEY }}" || (echo "Missing secret: TRIXIE_SSH_PRIVATE_KEY" && exit 1)

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.TRIXIE_SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${TRIXIE_SSH_PORT:-22}" "${TRIXIE_SSH_HOST}" >> ~/.ssh/known_hosts

      - name: Copy compose file to target
        run: |
          set -euo pipefail
          scp -P "${TRIXIE_SSH_PORT:-22}" docker-compose.yml "${TRIXIE_SSH_USER}@${TRIXIE_SSH_HOST}:/tmp/codex-openai-proxy.docker-compose.yml"

      - name: Deploy on trixie and wire Caddy
        env:
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ssh -p "${TRIXIE_SSH_PORT:-22}" "${TRIXIE_SSH_USER}@${TRIXIE_SSH_HOST}" \
            "IMAGE_REF='${IMAGE_REF}' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' CADDY_HOSTNAME='${CADDY_HOSTNAME}' PROXY_API_KEY='${PROXY_API_KEY}' bash -s" <<'REMOTE'
          set -euo pipefail

          sudo mkdir -p /opt/codex-openai-proxy
          sudo chown -R "$USER":"$USER" /opt/codex-openai-proxy
          cp /tmp/codex-openai-proxy.docker-compose.yml /opt/codex-openai-proxy/docker-compose.yml

          if [ ! -f "/opt/codex-openai-proxy/auth.json" ]; then
            echo "Missing required auth file: /opt/codex-openai-proxy/auth.json"
            exit 1
          fi

          printf 'CODEX_OPENAI_PROXY_IMAGE=%s\nPROXY_API_KEY=%s\n' "${IMAGE_REF}" "${PROXY_API_KEY}" > /opt/codex-openai-proxy/.env
          chmod 600 /opt/codex-openai-proxy/.env

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin
          cd /opt/codex-openai-proxy
          docker compose --env-file .env pull
          docker compose --env-file .env up -d --remove-orphans

          CADDY_FILE=/opt/caddy/Caddyfile
          if ! grep -Fq "${CADDY_HOSTNAME} {" "${CADDY_FILE}"; then
            printf '\n%s {\n    import cf_dns\n    reverse_proxy codex-openai-proxy:8080\n}\n' "${CADDY_HOSTNAME}" | sudo tee -a "${CADDY_FILE}" >/dev/null
          fi

          cd /opt/caddy
          sudo docker compose up -d
          REMOTE
