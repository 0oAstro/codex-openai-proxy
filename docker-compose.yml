services:
  codex-openai-proxy:
    image: ${CODEX_OPENAI_PROXY_IMAGE:-ghcr.io/0oastro/codex-openai-proxy:latest}
    container_name: codex-openai-proxy
    restart: unless-stopped
    ports:
      - 127.0.0.1:${CODEX_OPENAI_PROXY_PORT:-8080}:8080
    environment:
      PORT: 8080
      PROXY_API_KEY: ${PROXY_API_KEY:-}
      CODEX_AUTH_FILE: /opt/codex-openai-proxy/auth.json
    volumes:
      - /opt/codex-openai-proxy/auth.json:/opt/codex-openai-proxy/auth.json
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - main-network

networks:
  main-network:
    external: true
